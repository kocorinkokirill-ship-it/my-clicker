<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🤖 AI Clicker</title>
    <style>
        /* ======= ОБНУЛЕНИЕ ======= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0b0e1a;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ======= КОНТЕЙНЕР ======= */
        .game-wrapper {
            background: #14182b;
            border-radius: 20px;
            padding: 15px 18px 18px 18px;
            box-shadow: 0 10px 40px rgba(0, 20, 255, 0.2);
            border: 1px solid rgba(80, 140, 255, 0.12);
            max-width: 550px;
            width: 98vw;
            max-height: 98vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ======= ЗАГОЛОВОК ======= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding-bottom: 8px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #3a6eff);
        }
        .logo-text {
            font-weight: 700;
            font-size: 18px;
            color: #e0e8ff;
        }
        .logo-text span {
            color: #5a8aff;
        }
        .stats-mini {
            color: #8899bb;
            font-size: 12px;
            text-align: right;
            line-height: 1.4;
        }
        .stats-mini strong {
            color: #f0f4ff;
        }

        /* ======= СЧЁТ ======= */
        .score-board {
            background: #0c1022;
            border-radius: 14px;
            padding: 8px 16px;
            border: 1px solid #2a3a6a;
            text-align: center;
            box-shadow: inset 0 2px 12px rgba(0,0,0,0.5);
        }
        .score-board .label {
            color: #6a7fa0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .score-board .value {
            font-size: 36px;
            font-weight: 800;
            color: #b8d0ff;
            text-shadow: 0 0 20px rgba(70, 130, 255, 0.2);
            line-height: 1.1;
        }
        .score-board .per-click {
            color: #6a8ac0;
            font-size: 12px;
        }
        .score-board .per-click span {
            color: #8ab4ff;
            font-weight: 600;
        }

        /* ======= АВАТАРКА ======= */
        .ai-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a4a9a, #0b1a3a);
            border: 3px solid #4a7aff;
            box-shadow: 0 0 30px rgba(60, 120, 255, 0.3), inset 0 0 40px rgba(60, 120, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.08s ease;
            position: relative;
            margin: 2px auto;
            flex-shrink: 0;
        }
        .ai-button:active {
            transform: scale(0.90);
            box-shadow: 0 0 50px rgba(60, 200, 255, 0.6);
            border-color: #8ab4ff;
        }
        .ai-button .avatar {
            font-size: 56px;
            line-height: 1;
            filter: drop-shadow(0 0 16px #3a6eff);
            pointer-events: none;
        }
        .ai-button .pulse-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 2px solid rgba(80, 160, 255, 0.15);
            animation: pulse 2s ease-out infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* ======= УРОВЕНЬ ======= */
        .level-section {
            width: 100%;
        }
        .level-bar {
            width: 100%;
            background: #0c1022;
            border-radius: 20px;
            height: 10px;
            border: 1px solid #1a2a4a;
            overflow: hidden;
            box-shadow: inset 0 1px 6px rgba(0,0,0,0.5);
        }
        .level-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3a6aff, #8ab4ff, #3a6aff);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        @keyframes shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
        .level-info {
            display: flex;
            justify-content: space-between;
            color: #7a8fb0;
            font-size: 11px;
            margin-top: 2px;
        }
        .level-info strong {
            color: #b0c8ff;
        }

        /* ======= УЛУЧШЕНИЯ ======= */
        .upgrades {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
        }
        .upgrade-card {
            background: #10182e;
            border: 1px solid #1f3160;
            border-radius: 12px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .upgrade-card:hover {
            border-color: #4a7aff;
            transform: translateY(-1px);
        }
        .upgrade-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
            transform: none !important;
        }
        .upgrade-card .name {
            font-weight: 600;
            color: #c8d8ff;
            font-size: 13px;
        }
        .upgrade-card .desc {
            font-size: 11px;
            color: #7a8fb0;
        }
        .upgrade-card .cost {
            font-size: 12px;
            color: #f0c060;
            font-weight: 600;
        }
        .upgrade-card .owned {
            font-size: 10px;
            color: #5a7aaa;
        }

        /* ======= СТАТИСТИКА ======= */
        .stats-footer {
            display: flex;
            justify-content: space-between;
            color: #5a6f90;
            font-size: 11px;
            border-top: 1px solid #1a2242;
            padding-top: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
            gap: 2px;
        }
        .stats-footer span {
            color: #8aafd0;
        }

        /* ======= АДАПТАЦИЯ ======= */
        @media (max-width: 500px) {
            .game-wrapper {
                padding: 10px 12px 12px 12px;
                border-radius: 14px;
            }
            .logo-text { font-size: 16px; }
            .logo-icon { font-size: 20px; }
            .score-board .value { font-size: 28px; }
            .ai-button { width: 90px; height: 90px; }
            .ai-button .avatar { font-size: 42px; }
            .upgrade-card .name { font-size: 12px; }
            .upgrade-card .desc { font-size: 10px; }
            .upgrade-card .cost { font-size: 11px; }
            .stats-footer { font-size: 10px; }
            .level-info { font-size: 10px; }
        }
        @media (max-width: 380px) {
            .game-wrapper { padding: 6px 8px; }
            .logo-text { font-size: 13px; }
            .score-board .value { font-size: 22px; }
            .ai-button { width: 70px; height: 70px; }
            .ai-button .avatar { font-size: 32px; }
            .upgrade-card { padding: 5px 6px; }
            .upgrade-card .name { font-size: 10px; }
            .upgrade-card .desc { display: none; }
            .stats-footer { font-size: 9px; flex-wrap: wrap; }
            .header .stats-mini { font-size: 10px; }
        }

        /* ======= FLOAT ТЕКСТ ======= */
        .float-text {
            position: fixed;
            pointer-events: none;
            font-weight: 700;
            font-size: 22px;
            color: #8ab4ff;
            text-shadow: 0 0 20px #3a6eff;
            animation: floatUp 1s ease-out forwards;
            z-index: 999;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        /* скрываем скролл, если он появляется */
        .game-wrapper::-webkit-scrollbar {
            width: 3px;
            background: transparent;
        }
        .game-wrapper::-webkit-scrollbar-thumb {
            background: #3a6aff;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">AI <span>Clicker</span></div>
        </div>
        <div class="stats-mini">
            <div>Ур. <strong id="levelDisplay">1</strong></div>
            <div>Кликов: <strong id="totalClicksDisplay">0</strong></div>
        </div>
    </div>

    <!-- СЧЁТ -->
    <div class="score-board">
        <div class="label">Очки ИИ</div>
        <div class="value" id="scoreDisplay">0</div>
        <div class="per-click">+<span id="clickPowerDisplay">1</span> за клик</div>
    </div>

    <!-- АВАТАРКА -->
    <div class="ai-button" id="aiButton">
        <div class="pulse-ring"></div>
        <div class="avatar">🤖</div>
    </div>

    <!-- УРОВЕНЬ -->
    <div class="level-section">
        <div class="level-bar">
            <div class="level-fill" id="levelFill" style="width:0%;"></div>
        </div>
        <div class="level-info">
            <span>До след: <strong id="nextLevelProgress">0</strong></span>
            <span>Бонус: <strong id="levelBonusDisplay">x1.0</strong></span>
        </div>
    </div>

    <!-- УЛУЧШЕНИЯ -->
    <div class="upgrades">
        <div class="upgrade-card" id="upgrade1" data-type="clickPower">
            <div class="name">⚡ Усиление</div>
            <div class="desc">+1 к силе</div>
            <div class="cost">💰 10</div>
            <div class="owned">Куп: <span id="up1Count">0</span></div>
        </div>
        <div class="upgrade-card" id="upgrade2" data-type="autoClicker">
            <div class="name">🤖 Автоклик</div>
            <div class="desc">+0.5/сек</div>
            <div class="cost">💰 50</div>
            <div class="owned">Куп: <span id="up2Count">0</span></div>
        </div>
        <div class="upgrade-card" id="upgrade3" data-type="critChance">
            <div class="name">🎯 Крит</div>
            <div class="desc">+5% шанс x3</div>
            <div class="cost">💰 200</div>
            <div class="owned">Куп: <span id="up3Count">0</span></div>
        </div>
        <div class="upgrade-card" id="upgrade4" data-type="passiveBoost">
            <div class="name">📈 Пассив</div>
            <div class="desc">+5% доход</div>
            <div class="cost">💰 500</div>
            <div class="owned">Куп: <span id="up4Count">0</span></div>
        </div>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats-footer">
        <div>Авто: <span id="autoCpsDisplay">0</span>/сек</div>
        <div>Крит: <span id="critDisplay">0%</span></div>
        <div>Пассив: <span id="passiveDisplay">x1.00</span></div>
    </div>
</div>

<script>
// ============================================================
//  AI CLICKER – ПОЛНАЯ ИГРА (АДАПТИВНАЯ)
// ============================================================

// ---- СОСТОЯНИЕ ----
const state = {
    score: 0,
    totalClicks: 0,
    level: 1,
    exp: 0,
    expToNext: 10,

    clickPower: 1,
    autoClickers: 0,
    critChance: 0,
    passiveBonus: 0,

    up1: 0,
    up2: 0,
    up3: 0,
    up4: 0,

    cost1: 10,
    cost2: 50,
    cost3: 200,
    cost4: 500,
};

// ---- DOM ----
const scoreDisplay = document.getElementById('scoreDisplay');
const totalClicksDisplay = document.getElementById('totalClicksDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const levelFill = document.getElementById('levelFill');
const nextLevelProgress = document.getElementById('nextLevelProgress');
const levelBonusDisplay = document.getElementById('levelBonusDisplay');
const clickPowerDisplay = document.getElementById('clickPowerDisplay');
const autoCpsDisplay = document.getElementById('autoCpsDisplay');
const critDisplay = document.getElementById('critDisplay');
const passiveDisplay = document.getElementById('passiveDisplay');

const up1Count = document.getElementById('up1Count');
const up2Count = document.getElementById('up2Count');
const up3Count = document.getElementById('up3Count');
const up4Count = document.getElementById('up4Count');

const upgradeCards = {
    up1: document.getElementById('upgrade1'),
    up2: document.getElementById('upgrade2'),
    up3: document.getElementById('upgrade3'),
    up4: document.getElementById('upgrade4'),
};

// ---- ВСПОМОГАТЕЛЬНЫЕ ----
function updateUI() {
    scoreDisplay.textContent = Math.floor(state.score);
    totalClicksDisplay.textContent = state.totalClicks;
    levelDisplay.textContent = state.level;

    const progress = Math.min(1, state.exp / state.expToNext);
    levelFill.style.width = (progress * 100) + '%';
    nextLevelProgress.textContent = Math.floor(state.exp) + ' / ' + state.expToNext;

    const bonus = 1 + (state.level - 1) * 0.1;
    levelBonusDisplay.textContent = 'x' + bonus.toFixed(1);

    const totalClickPower = state.clickPower * (1 + state.passiveBonus);
    clickPowerDisplay.textContent = totalClickPower.toFixed(1);

    const autoCps = state.autoClickers * 0.5 * (1 + state.passiveBonus);
    autoCpsDisplay.textContent = autoCps.toFixed(1);

    const critChance = Math.min(1, state.critChance);
    critDisplay.textContent = (critChance * 100).toFixed(0) + '%';
    passiveDisplay.textContent = 'x' + (1 + state.passiveBonus).toFixed(2);

    up1Count.textContent = state.up1;
    up2Count.textContent = state.up2;
    up3Count.textContent = state.up3;
    up4Count.textContent = state.up4;

    document.querySelector('#upgrade1 .cost').textContent = '💰 ' + Math.floor(state.cost1);
    document.querySelector('#upgrade2 .cost').textContent = '💰 ' + Math.floor(state.cost2);
    document.querySelector('#upgrade3 .cost').textContent = '💰 ' + Math.floor(state.cost3);
    document.querySelector('#upgrade4 .cost').textContent = '💰 ' + Math.floor(state.cost4);

    upgradeCards.up1.classList.toggle('disabled', state.score < state.cost1);
    upgradeCards.up2.classList.toggle('disabled', state.score < state.cost2);
    upgradeCards.up3.classList.toggle('disabled', state.score < state.cost3);
    upgradeCards.up4.classList.toggle('disabled', state.score < state.cost4);
}

// ---- ДОБАВЛЕНИЕ ОЧКОВ ----
function addScore(amount) {
    state.score += amount;
    state.totalClicks++;
    state.exp += amount;
    while (state.exp >= state.expToNext) {
        state.exp -= state.expToNext;
        state.level++;
        state.expToNext = Math.floor(state.expToNext * 1.5) + 5;
        state.clickPower += 0.1;
    }
    updateUI();
}

// ---- КЛИК ----
function handleClick(e) {
    let basePower = state.clickPower;
    const critRoll = Math.random();
    if (critRoll < state.critChance) {
        basePower *= 3;
        showFloatText(e.clientX || e.pageX, e.clientY || e.pageY, '💥 КРИТ!', '#ffaa44');
    }
    const total = basePower * (1 + state.passiveBonus);
    addScore(total);
    showFloatText(e.clientX || e.pageX, e.clientY || e.pageY, '+' + total.toFixed(1), '#8ab4ff');
}

// ---- ВСПЛЫВАЮЩИЙ ТЕКСТ ----
function showFloatText(x, y, text, color = '#8ab4ff') {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = text;
    el.style.left = (x - 20) + 'px';
    el.style.top = (y - 20) + 'px';
    el.style.color = color;
    el.style.textShadow = '0 0 20px ' + color;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

// ---- ПОКУПКА ----
function buyUpgrade(type) {
    let cost, field, increment;
    switch(type) {
        case 'clickPower':
            cost = state.cost1; field = 'up1'; increment = 1;
            state.cost1 = Math.floor(state.cost1 * 1.3) + 2;
            break;
        case 'autoClicker':
            cost = state.cost2; field = 'up2'; increment = 1;
            state.cost2 = Math.floor(state.cost2 * 1.4) + 5;
            break;
        case 'critChance':
            cost = state.cost3; field = 'up3'; increment = 0.05;
            state.cost3 = Math.floor(state.cost3 * 1.5) + 10;
            break;
        case 'passiveBoost':
            cost = state.cost4; field = 'up4'; increment = 0.05;
            state.cost4 = Math.floor(state.cost4 * 1.6) + 20;
            break;
        default: return;
    }
    if (state.score < cost) return;
    state.score -= cost;
    switch(type) {
        case 'clickPower': state.clickPower += increment; break;
        case 'autoClicker': state.autoClickers += increment; break;
        case 'critChance': state.critChance = Math.min(1, state.critChance + increment); break;
        case 'passiveBoost': state.passiveBonus = Math.min(1, state.passiveBonus + increment); break;
    }
    state[field] = (state[field] || 0) + 1;
    updateUI();
}

// ---- АВТОТИК ----
function autoTick() {
    if (state.autoClickers > 0) {
        const amount = state.autoClickers * 0.5 * (1 + state.passiveBonus);
        addScore(amount);
    }
}

// ---- СОБЫТИЯ ----
document.getElementById('aiButton').addEventListener('click', (e) => {
    handleClick(e);
});

document.getElementById('upgrade1').addEventListener('click', () => buyUpgrade('clickPower'));
document.getElementById('upgrade2').addEventListener('click', () => buyUpgrade('autoClicker'));
document.getElementById('upgrade3').addEventListener('click', () => buyUpgrade('critChance'));
document.getElementById('upgrade4').addEventListener('click', () => buyUpgrade('passiveBoost'));

// ---- ЗАПУСК ----
setInterval(autoTick, 1000);
updateUI();

// ---- СБРОС ПО ДВОЙНОМУ КЛИКУ НА ЛОГО ----
document.querySelector('.logo').addEventListener('dblclick', () => {
    if (confirm('Сбросить прогресс?')) location.reload();
});

console.log('🤖 AI Clicker (адаптив) запущен!');
</script>
</body>
</html>
